name: SmartPlay 監測 + push

# 康文署每朝 7:00 放出已取消嘅場。
# 7:05 scrape,跟住即刻 match watches 送 push。

on:
  schedule:
    - cron: "5 23 * * *"       # UTC 23:05 = 香港 07:05
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 裝 dependencies
        run: pip install -r requirements.txt

      # 1. Scrape release-log
      #    (要香港 proxy —— GitHub 美國 IP 會俾康文署封)
      - name: Scrape 已取消再開放嘅場
        env:
          HK_PROXY: ${{ secrets.HK_PROXY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python monitor_cloud.py

      # 2. Match watches -> Expo push
      #    就算 scrape 有事都照跑 —— 可能仲有琴日未 push 嘅場。
      - name: Push 通知
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python push_notify.py
