name: 保溫 availability cache

# 康文署 open data 每 5 分鐘更新,Edge Function cache TTL 30 分鐘。
# 每 10 分鐘主動 call 一次,令 cache 永遠係熱嘅 ——
# 用戶撳「搵場」就秒開,唔使等 10 秒去拉 5-9MB。
#
# ⚠ 用 warm:true 模式 —— function 淨係 refresh cache,唔會回傳成份資料
#   (舊版每次攞返 ~50KB,5 個運動 × 144 次/日,一個月白燒成 GB egress)。
#
# 運動清單要同 app 個 OD_SPORTS / edge function 個 SPORTS 一致:
#   tennis badminton basketball volleyball football

on:
  schedule:
    - cron: "*/10 * * * *"      # 每 10 分鐘
  workflow_dispatch:            # 都可以手動 trigger

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: 逐個運動 warm 一次 Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          for SPORT in tennis badminton basketball volleyball football; do
            echo "--- $SPORT ---"
            CODE=$(curl -s -o /tmp/out.json -w "%{http_code}" \
              -X POST "$SUPABASE_URL/functions/v1/availability" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"sport\":\"$SPORT\",\"warm\":true}" \
              --max-time 120)

            if [ "$CODE" != "200" ]; then
              echo "::warning::$SPORT 回 HTTP $CODE"
              head -c 300 /tmp/out.json || true
              echo
            else
              cat /tmp/out.json
              echo
            fi
          done
